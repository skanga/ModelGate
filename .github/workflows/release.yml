name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example v0.1.0
        required: true
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Verify Package And Publish
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      DOCKER_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify
        run: mvn -q verify

      - name: Package shaded jar
        run: mvn -q -DskipTests package

      - name: Smoke test shaded jar
        shell: bash
        run: |
          java -jar target/modelgate-0.1.jar --port 18788 &
          gateway_pid=$!
          trap 'kill $gateway_pid' EXIT
          for attempt in {1..60}; do
            if curl --fail --silent http://localhost:18788/health > /dev/null \
              && curl --fail --silent http://localhost:18788/ready > /dev/null; then
              exit 0
            fi
            sleep 0.5
          done
          exit 1

      - name: Build Docker image
        run: docker build -t modelgate:${DOCKER_TAG} .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: modelgate-${{ env.RELEASE_TAG }}-jar
          path: target/modelgate-0.1.jar
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: target/modelgate-0.1.jar
          fail_on_unmatched_files: true
